<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦闘 - Cities:War</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="battle-page wave-battle-page">
    <header class="battle-header">
        <div>
            <h1>チュートリアル</h1>
            <p id="battleMessage">進行値が行動値に達したユニットから行動します</p>
        </div>
        <div class="battle-status">
            <span id="battleTurnLabel">Wave 1/3</span>
            <strong id="battleCostLabel">進行値 0</strong>
            <button onclick="leaveRealtimeBattle()">撤退</button>
        </div>
    </header>

    <main class="wave-battle-layout">
        <section class="wave-timeline-panel">
            <h2>ログ</h2>
            <div class="battle-log" id="battleLog"></div>
        </section>

        <section class="wave-field">
            <div class="wave-enemies" id="enemyField"></div>
            <div class="wave-center">
                <div class="progress-orb" id="battleProgressOrb">0</div>
            </div>
            <div class="wave-allies" id="playerField"></div>
        </section>

        <section class="wave-command-panel">
            <h2>行動ユニット</h2>
            <div class="selected-card-box" id="selectedCardBox">進行中</div>
            <div class="rt-actions" id="battleActionPanel"></div>
            <h2>行動順</h2>
            <div class="rt-timeline" id="battleTimeline"></div>
            <h2>戦況</h2>
            <div id="playerInfo"></div>
            <div id="enemyInfo"></div>
        </section>
    </main>
</div>

<div class="cw-modal" id="battleCardModal" aria-hidden="true">
    <div class="cw-modal-panel card-detail-panel">
        <button class="modal-close" onclick="closeBattleCardDetail()">×</button>
        <div id="battleCardDetail"></div>
    </div>
</div>

<div class="battle-cutin" id="battleCutin">
    <strong id="battleCutinText">勝利！</strong>
</div>

<div class="turn-cutin" id="turnCutin">
    <span id="turnCutinSide">自軍</span>
    <strong id="turnCutinName">扶桑の行動</strong>
</div>

<script src="script.js?v=audio-buffer-bgm-4"></script>
<script>
initBattle();
</script>
</body>
</html>
