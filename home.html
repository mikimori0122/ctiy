<!DOCTYPE html>
<html lang="ja">
<head>

  <title>Cities:War</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <nav class="menu">

    <button class="active" onclick="location.href='gikai.html'">
      <span>議</span>
      議会
      <small>定例会・臨時会</small>
    </button>

    <button>
      <span>商</span>

    <button>
